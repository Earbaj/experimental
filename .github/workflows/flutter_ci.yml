name: Flutter CI - Test & Analyze

# কখন চলবে?
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'    # feature/login, feature/payment ইত্যাদি সব branches
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Analysis (Lint Check)
  # ─────────────────────────────────────────────
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true              # Flutter download cache করবে — faster

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Flutter Analyze  # Code-এ কোনো warning/error আছে কিনা
        run: flutter analyze

      - name: Check Formatting     # Code properly formatted কিনা
        run: dart format --output=none --set-exit-if-changed .

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Widget Tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze        # analyze pass হলেই test চলবে

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests with Coverage
        run: flutter test --coverage

      - name: Upload Coverage Report  # Optional: coverage দেখার জন্য
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

